<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(45deg, #2c3e50, #8e44ad, #3498db, #e74c3c);
            background-size: 400% 400%;
            animation: bgGradient 15s ease infinite;
            color: white;
            padding: 20px;
        }

        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-align: center;
        }

        .desc {
            text-align: center;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .article {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            padding: 12px;
            border-radius: 10px;
        }
        .article:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-3px);
        }

        .article h2 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .article p {
            opacity: 0.85;
            line-height: 1.6;
        }

        .article .time {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>我的个人博客</h1>
        <p class="desc">记录生活、技术与思考</p>

        <!-- 改成 Hermes 安装教程 + 点击跳转 -->
        <div class="article" id="hermesArticle">
            <h2>Hermes 安装教程</h2>
            <p>Windows 平台 Hermes Agent 完整安装配置图文教程，含Git环境、安装命令、模型API配置全过程。</p>
            <div class="time">2025-06-01</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const hermesArticle = document.getElementById('hermesArticle');
    if (hermesArticle) {
        hermesArticle.addEventListener('click', function() {
            location.href = 'hermes.html';
        });
    }
});
</script>
        </div>

        <div class="article">
            <h2>GitHub Pages 搭建教程</h2>
            <p>无需服务器、无需域名，直接用 GitHub 就能免费拥有一个属于自己的网站。</p>
            <div class="time">2025-06-01</div>
        </div>

        <div class="article">
            <h2>动态背景实现原理</h2>
            <p>使用 CSS 渐变 + 动画，实现流动的彩色背景，不需要任何图片和插件。</p>
            <div class="time">2025-06-01</div>
        </div>
    </div>
</body>
</html>
